<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="front" x1="16" y1="5.3" x2="15" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0feff"/>
      <stop offset="1" stop-color="#6fdcea"/>
    </linearGradient>
  </defs>

  <!-- Transparent background — just the crystal, so the tab icon adapts. -->
  <!-- Faceted memory-crystal at the same 3/4 pose as the animated 3D logo.
       Vertices: A(+Y) top, B(+X) right, C(+Z) front, D(-Y) bottom,
       E(-X) left, F(-Z) upper-left. -->
  <polygon points="6.2,18.3 16,5.3 23.4,19.5" fill="url(#front)"/>
  <polygon points="16,5.3 23.5,14.2 23.4,19.5" fill="#5eead4"/>
  <polygon points="6.2,18.3 16,5.3 10.9,13.6" fill="#38bdf8"/>
  <polygon points="6.2,18.3 23.4,19.5 16,25.2" fill="#6366f1"/>

  <!-- Glowing hairline cuts -->
  <g stroke="#e0fbff" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <polygon points="23.5,14.2 16,5.3 10.9,13.6 6.2,18.3 16,25.2 23.4,19.5" stroke-opacity="0.9"/>
    <line x1="16" y1="5.3" x2="23.4" y2="19.5" stroke-opacity="0.5"/>
    <line x1="16" y1="5.3" x2="6.2" y2="18.3" stroke-opacity="0.5"/>
    <line x1="23.4" y1="19.5" x2="6.2" y2="18.3" stroke-opacity="0.5"/>
  </g>
</svg>
